# site properties and page defaults
title: Zhou Lab | University of Chicago
subtitle: ""
description: Zhou Lab at the University of Chicago studies somatic mutations, neurodegeneration, and single-cell genomics.
header: images/background2.png
footer: images/background2.png
proofer: false
url: "https://zhoulab.bio"
baseurl: ""

# site social media and other links
links:
  email: zinanzhou@uchicago.edu
  orcid: 0000-0003-2014-3650
  google-scholar: ZCU56tsAAAAJ
  twitter: zinan_zhou

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
